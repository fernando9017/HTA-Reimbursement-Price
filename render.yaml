services:
  - type: web
    name: hta-reimbursement-finder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OFFLINE_MODE
        value: "1"
    healthCheckPath: /api/status
