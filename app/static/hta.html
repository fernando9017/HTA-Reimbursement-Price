<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTA &amp; Reimbursement — HTA Assessment Finder</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-WicLt2ziy4Y9gaHl7hJ8s.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1>HTA &amp; Reimbursement</h1>
            <p class="subtitle">Search EMA-authorized medicines and find HTA assessment outcomes by country</p>
        </div>
    </header>

    <nav class="page-nav">
        <div class="container">
            <a href="/" class="back-link">&larr; Home</a>
            <span class="page-title">HTA &amp; Reimbursement</span>
        </div>
    </nav>

    <main class="container">
        <!-- Step 1: Search for a medicine -->
        <section id="search-section" class="card">
            <h2>1. Search for a medicine</h2>
            <div class="search-box">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Enter medicine name or active substance (e.g., Keytruda, pembrolizumab)"
                    autocomplete="off"
                >
                <button id="search-btn">Search</button>
            </div>
            <div id="search-status" class="status-msg hidden"></div>
            <div id="search-results" class="hidden"></div>
        </section>

        <!-- Step 2: Medicine details + indication -->
        <section id="medicine-section" class="card hidden">
            <h2>2. EMA Authorized Indications</h2>
            <div id="medicine-details"></div>
        </section>

        <!-- Step 3: Select country and view assessments -->
        <section id="assessment-section" class="card hidden">
            <h2>3. HTA Assessment Results</h2>
            <div class="country-selector">
                <label for="country-select">Select country:</label>
                <select id="country-select"></select>
                <button id="find-assessments-btn">Find Assessments</button>
            </div>
            <div id="assessment-status" class="status-msg hidden"></div>
            <div id="assessment-results" class="hidden"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Data sources: <a href="https://www.ema.europa.eu" target="_blank" rel="noopener">EMA</a> &middot;
            <a href="https://www.has-sante.fr" target="_blank" rel="noopener">HAS</a> &middot;
            <a href="https://base-donnees-publique.medicaments.gouv.fr" target="_blank" rel="noopener">BDPM</a> &middot;
            <a href="https://www.g-ba.de" target="_blank" rel="noopener">G-BA</a> &middot;
            <a href="https://www.nice.org.uk" target="_blank" rel="noopener">NICE</a></p>
        </div>
    </footer>

    <script src="/static/shared.js"></script>
    <script src="/static/hta.js"></script>
</body>
</html>
